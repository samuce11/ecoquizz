<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoQuizz 🌍</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1b5e20, #43a047);
            --correct-color: #2e7d32;
            --wrong-color: #c62828;
            --text-color: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Fundo Animado e Super Estimulante */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #34d399, #60a5fa, #fbbf24, #a7f3d0);
            background-size: 400% 400%;
            animation: vivoGradient 10s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-color);
            overflow-x: hidden;
        }

        @keyframes vivoGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Cartão Principal Destacado com Efeito Flutuante */
        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        h1 {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 800;
        }

        p.subtitle {
            font-size: 1rem;
            color: #475569;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        .btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 15px rgba(27, 94, 32, 0.3);
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(27, 94, 32, 0.4);
        }

        .options-container {
            display: flex;
            flex-direction: column;
            margin: 25px 0 15px 0;
            gap: 12px;
        }

        .option-btn {
            background: #ffffff;
            color: var(--text-color);
            border: 2px solid #cbd5e1;
            padding: 16px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not([disabled]) {
            border-color: #43a047;
            background-color: #f0fdf4;
            transform: translateX(4px);
        }

        .option-btn.correct {
            background-color: #dcfce7 !important;
            border-color: var(--correct-color) !important;
            color: var(--correct-color) !important;
        }

        .option-btn.wrong {
            background-color: #fee2e2 !important;
            border-color: var(--wrong-color) !important;
            color: var(--wrong-color) !important;
        }

        /* Caixa de Feedback com Dicas */
        #feedback-box {
            margin-top: 20px;
            padding: 18px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            line-height: 1.5;
            display: none;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        #feedback-box.correct-feedback {
            background-color: #f0fdf4;
            color: var(--correct-color);
            border-left: 6px solid var(--correct-color);
        }

        #feedback-box.wrong-feedback {
            background-color: #fef2f2;
            color: var(--wrong-color);
            border-left: 6px solid var(--wrong-color);
        }

        .tip-title {
            font-weight: 800;
            margin-top: 8px;
            color: #334155;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .hidden { display: none !important; }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            border-radius: 12px;
            overflow: hidden;
        }

        .ranking-table th, .ranking-table td {
            padding: 14px;
            text-align: center;
        }

        .ranking-table th {
            background: var(--primary-gradient);
            color: white;
        }

        .ranking-table tr:nth-child(even) { background-color: #f8fafc; }
        .ranking-table td { border-bottom: 1px solid #e2e8f0; }

        .media-box img {
            max-width: 100%;
            height: auto;
            max-height: 150px;
            object-fit: contain;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        #question-number {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #2563eb;
            font-weight: 800;
            margin-bottom: 8px;
        }

        #question-text {
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1.4;
            color: #0f172a;
        }

        input[type="text"] {
            padding: 15px;
            width: 100%;
            margin-bottom: 20px;
            border-radius: 14px;
            border: 2px solid #cbd5e1;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            text-align: center;
        }

        #encouragement-text {
            font-weight: 800;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h1>EcoQuizz 🌍</h1>
        <p class="subtitle">Desafio da Sustentabilidade! Teste sua mente com 15 perguntas dinâmicas sobre reciclagem e ajude a salvar o planeta!</p>
        <div class="media-box">
            <img src="https://cdn-icons-png.flaticon.com/512/3246/3246320.png" alt="Símbolo da Reciclagem">
        </div>
        <input type="text" id="username" placeholder="Digite seu nome para entrar no desafio">
        <button class="btn" onclick="startQuiz()">Entrar no Jogo 🚀</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="question-number">Pergunta 1 de 15</div>
        <div id="question-text"></div>
        
        <div class="options-container" id="options-box"></div>
        
        <div id="feedback-box"></div>
        
        <button id="next-btn" class="btn hidden" style="margin-top: 20px;" onclick="nextQuestion()">Avançar ➡️</button>
    </div>

    <div id="end-screen" class="hidden">
        <h2>Resultados Finais 🎉</h2>
        <div id="encouragement-text"></div>
        <p id="score-text" style="font-size: 1.2rem; margin: 15px 0; font-weight: 700;"></p>
        
        <h3 style="margin-top: 25px; color: #1b5e20;">🏆 Quadro de Líderes Eco-Gênios</h3>
        <table class="ranking-table">
            <thead>
                <tr>
                    <th>Posição</th>
                    <th>Nome</th>
                    <th>Pontos</th>
                </tr>
            </thead>
            <tbody id="ranking-body"></tbody>
        </table>

        <button class="btn" style="margin-top: 10px;" onclick="restartQuiz()">Jogar Novamente 🔄</button>
    </div>
</div>

<script>
    const totalQuestionsDatabase = [
        { q: "Qual a cor da lixeira destinada ao descarte de plástico?", o: ["Verde", "Azul", "Vermelha", "Amarela"], a: 2, tip: "Pense em objetos cotidianos como garrafas PET e sacolas; eles pertencem à lixeira de cor vermelha!" },
        { q: "Qual material deve ser descartado na lixeira azul?", o: ["Papel e Papelão", "Vidro", "Metal", "Resíduo Orgânico"], a: 0, tip: "Cadernos velhos, caixas de papelão e jornais limpos devem sempre ir para a lixeira azul." },
        { q: "A lixeira amarela serve para coletar qual tipo de resíduo?", o: ["Plástico", "Metal", "Vidro", "Pilhas"], a: 1, tip: "Latinhas de refrigerante, tampas de metal e panelas velhas encontram seu lugar na lixeira amarela." },
        { q: "Na lixeira verde, qual material deve ser jogado?", o: ["Papel", "Orgânico", "Plástico", "Vidro"], a: 3, tip: "Garrafas de suco, potes de conserva e frascos de vidro quebrados vão na verde. Lembre-se de embalar bem os quebrados!" },
        { q: "Qual a utilidade da lixeira de cor marrom?", o: ["Resíduos Orgânicos", "Madeira", "Eletrônicos", "Lixo Hospitalar"], a: 0, tip: "Restos de alimentos, cascas de frutas e borra de café vão aqui para serem transformados em adubo." },
        { q: "Onde devem ser descartadas pilhas e baterias velhas?", o: ["Na lixeira vermelha", "Na lixeira amarela", "Em postos de coleta específicos", "No lixo comum"], a: 2, tip: "Esses materiais contêm compostos químicos tóxicos pesados e nunca devem ir para as lixeiras comuns." },
        { q: "Qual destes materiais NÃO pode ser reciclado?", o: ["Garrafa PET", "Caixa de papelão", "Espelho", "Lata de alumínio"], a: 2, tip: "Vidros planos temperados, como espelhos, boxes de banheiro e cerâmicas, possuem processos químicos diferentes e não se misturam na reciclagem comum." },
        { q: "A caixa de leite (longa vida) é feita de quais materiais?", o: ["Apenas plástico", "Papel, plástico e alumínio", "Apenas papelão", "Vidro e plástico"], a: 1, tip: "Ela é uma embalagem 'multicamadas' desenvolvida para proteger o alimento da luz e do oxigênio externo." },
        { q: "O que deve ser feito com o óleo de cozinha usado?", o: ["Jogar na pia", "Jogar no vaso sanitário", "Guardar em garrafa PET e levar ao descarte correto", "Enterrar no quintal"], a: 2, tip: "Um único litro de óleo jogado na pia pode contaminar milhares de litros de água pura." },
        { q: "Qual o tempo estimado para o plástico se decompor na natureza?", o: ["Cerca de 10 anos", "Mais de 400 anos", "50 anos", "Apenas 1 ano"], a: 1, tip: "O plástico demora séculos para sumir do meio ambiente, por isso reduzir o consumo é tão urgente." },
        { q: "O alumínio pode ser reciclado quantas vezes?", o: ["Apenas 1 vez", "No máximo 5 vezes", "Infinitas vezes", "Não pode ser reciclado"], a: 2, tip: "O metal reciclado mantém 100% de sua qualidade inicial, podendo passar por fusão repetidamente sem perdas." },
        { q: "Qual termo define o processo de transformar resíduos orgânicos em adubo?", o: ["Incineração", "Compostagem", "Logística reversa", "Aterro sanitário"], a: 1, tip: "A compostagem funciona como uma reciclagem natural realizada por microorganismos do solo!" },
        { q: "O que significa o conceito de Logística Reversa?", o: ["Devolver o produto usado ao fabricante para reciclagem", "Entregar o lixo na casa do vizinho", "Comprar apenas produtos importados", "Reciclar em casa"], a: 0, tip: "É a responsabilidade da empresa recolher embalagens de pós-consumo, como eletrodomésticos ou pneus velhos." },
        { q: "Papel higiênico usado e guardanapos sujos de gordura são recicláveis?", o: ["Sim, na lixeira azul", "Não, são considerados rejeitos não recicláveis", "Sim, se forem lavados", "Sim, na lixeira vermelha"], a: 1, tip: "Fibras de papel contaminadas com matéria orgânica ou óleos perdem a capacidade física de reaproveitamento." },
        { q: "Completar a frase: Reciclar é bom, mas o melhor para o meio ambiente é primeiro...", o: ["Gastar mais", "Reduzir o consumo e evitar gerar o lixo", "Queimar o lixo", "Acumular embalagens"], a: 1, tip: "A melhor embalagem para o planeta é aquela que sequer precisou ser produzida ou extraída." }
    ];

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let username = "";
    let answered = false;

    let ranking = JSON.parse(localStorage.getItem('ecoQuizRankingReciclagem')) || [
        {name: "Profe Silvia", score: 14},
        {name: "EcoAluno", score: 11}
    ];

    function startQuiz() {
        username = document.getElementById('username').value.trim();
        if (!username) {
            alert("Por favor, digite seu nome para entrar no jogo!");
            return;
        }

        currentQuestions = [...totalQuestionsDatabase].sort(() => 0.5 - Math.random());
        currentQuestionIndex = 0;
        score = 0;

        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        showQuestion();
    }

    function showQuestion() {
        answered = false;
        document.getElementById('next-btn').classList.add('hidden');
        
        const feedbackBox = document.getElementById('feedback-box');
        feedbackBox.style.display = "none";

        if (currentQuestionIndex >= currentQuestions.length) {
            endQuiz();
            return;
        }

        const qData = currentQuestions[currentQuestionIndex];
        document.getElementById('question-number').innerText = `Pergunta ${currentQuestionIndex + 1} de ${currentQuestions.length}`;
        document.getElementById('question-text').innerText = qData.q;

        const optionsBox = document.getElementById('options-box');
        optionsBox.innerHTML = "";

        qData.o.forEach((option, index) => {
            const button = document.createElement('button');
            button.classList.add('option-btn');
            button.innerText = option;
            button.onclick = () => checkAnswer(button, index);
            optionsBox.appendChild(button);
        });
    }

    function checkAnswer(selectedButton, selectedIndex) {
        if (answered) return;
        answered = true;

        const qData = currentQuestions[currentQuestionIndex];
        const buttons = document.querySelectorAll('.option-btn');
        const feedbackBox = document.getElementById('feedback-box');

        buttons.forEach(btn => btn.disabled = true);

        if (selectedIndex === qData.a) {
            score++;
            selectedButton.classList.add('correct');
            feedbackBox.innerHTML = `<strong>🌱 Parabéns! Você acertou em cheio!</strong><br><div class="tip-title">Curiosidade Pedagógica:</div> ${qData.tip}`;
            feedbackBox.className = "correct-feedback";
        } else {
            selectedButton.classList.add('wrong');
            buttons[qData.a].classList.add('correct');
            feedbackBox.innerHTML = `<strong>🍂 Quase lá! A resposta correta era: "${qData.o[qData.a]}".</strong><br><div class="tip-title">💡 Dica Eco-Educativa:</div> ${qData.tip}`;
            feedbackBox.className = "wrong-feedback";
        }

        feedbackBox.style.display = "block";
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentQuestionIndex++;
        showQuestion();
    }

    function endQuiz() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('score-text').innerText = `${username}, você fez ${score} de ${currentQuestions.length} pontos!`;

        const encouragement = document.getElementById('encouragement-text');
        if (score === 15) {
            encouragement.innerText = "🌟 Perfeito! Você é um Protetor Ecológico Máximo!";
            encouragement.style.color = "#2e7d32";
        } else if (score >= 10) {
            encouragement.innerText = "👍 Muito bom! Seus conhecimentos ajudam muito o planeta!";
            encouragement.style.color = "#1d4ed8";
        } else {
            encouragement.innerText = "📚 O planeta conta com você! Leia as dicas e tente evoluir na próxima rodada!";
            encouragement.style.color = "#ea580c";
        }

        ranking.push({ name: username, score: score });
        ranking.sort((a, b) => b.score - a.score);
        ranking = ranking.slice(0, 5);
        localStorage.setItem('ecoQuizRankingReciclagem', JSON.stringify(ranking));

        updateRankingTable();
    }

    function updateRankingTable() {
        const tbody = document.getElementById('ranking-body');
        tbody.innerHTML = "";
        ranking.forEach((player, index) => {
            const row = `<tr>
                <td>${index + 1}º</td>
                <td>${player.name}</td>
                <td>${player.score}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    function restartQuiz() {
        window.location.reload(); 
    }
</script>
</body>
</html>
